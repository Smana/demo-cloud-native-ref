apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: podinfo
  namespace: apps
spec:
  parentRefs:
    - name: platform-private
      namespace: infrastructure
  hostnames:
    - "podinfo.priv.${domain_name}"
  rules:
    - backendRefs:
        - name: podinfo
          port: 9898
