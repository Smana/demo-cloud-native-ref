apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: podinfo
  namespace: apps
spec:
  releaseName: podinfo
  chart:
    spec:
      chart: podinfo
      sourceRef:
        kind: HelmRepository
        name: podinfo
        namespace: flux-system
      version: "6.6.0"
  interval: 2m0s
  install:
    createNamespace: true
    remediation:
      retries: 3
  values:
    ui:
      color: "#02193d"
      message: "Cuttlefish playing tennis"
      logo: ""
